<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blenderで作った部屋のAR表示</title>
  
  <!-- model-viewerの読み込み (最新の安定版) -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    
    /* 3Dモデルを表示するエリアのサイズ指定 */
    model-viewer {
      width: 100%;
      height: 100%;
      max-width: 800px;
      max-height: 600px;
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <!-- 
    ar: AR表示ボタンを有効化する
    camera-controls: ユーザーが指やマウスでモデルを回転・ズームできるようにする
    shadow-intensity: 足元に影を落としてよりリアルにする
  -->
<model-viewer 
  src="room.glb" 
  ar 
  camera-controls 
  shadow-intensity="1"
  shadow-softness="0.5"
  exposure="0.8" <!-- 全体を少し暗くして白飛びを防ぐ -->
  environment-image="neutral" <!-- ライティングのコントラストを少し強める -->
  alt="部屋のモデル">
</model-viewer>

</body>
</html>
